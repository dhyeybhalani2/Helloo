<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 25th Birthday Didi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400&display=swap');

        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            margin: 0;
            touch-action: manipulation;
            user-select: none;
        }

        .font-serif { font-family: 'Cinzel', serif; }

        .text-gold {
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Screen Transitions */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.98);
            z-index: 10;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* Irritation Button */
        #verify-btn {
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            z-index: 50;
        }

        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Minimalist Candle Flames */
        .flame {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 18px;
            background: radial-gradient(ellipse at bottom, #fff 0%, var(--gold-light) 40%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 -5px 20px rgba(212, 175, 55, 0.8), 0 0 10px rgba(255, 255, 255, 0.5);
            animation: flicker 0.15s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .flame.lit { opacity: 1; }

        @keyframes flicker {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0.95); opacity: 0.9; }
            100% { transform: translateX(-50%) rotate(2deg) scale(1.05); opacity: 1; }
        }

        /* Sleek Cake Splitting Effect */
        #cake-container {
            position: relative;
            width: 280px;
            height: 200px;
            cursor: pointer;
        }
        
        .cake-half {
            position: absolute;
            inset: 0;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease;
        }
        
        #cake-left { clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }
        #cake-right { clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); }

        .cut-active #cake-left { transform: translateX(-80px) translateY(20px) rotate(-4deg); opacity: 0; }
        .cut-active #cake-right { transform: translateX(80px) translateY(20px) rotate(4deg); opacity: 0; }

        .cut-line {
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            transform: translateX(-50%) scaleY(0);
            box-shadow: 0 0 15px var(--gold);
            z-index: 30;
            transition: transform 0.6s ease-in-out, opacity 0.5s;
        }
        .cut-active .cut-line { transform: translateX(-50%) scaleY(1); opacity: 0; transition-delay: 0s, 0.6s; }

        /* Minimalist Balloons */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 40px;
            height: 55px;
            background: radial-gradient(circle at 12px 12px, rgba(255,255,255,0.2), currentColor);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp 8s ease-in forwards;
            opacity: 0;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 1px;
            height: 30px;
            background: rgba(255,255,255,0.2);
        }

        @keyframes floatUp {
            0% { bottom: -150px; opacity: 0; transform: translateX(0) scale(0.8); }
            10% { opacity: 0.8; }
            100% { bottom: 120vh; opacity: 0.8; transform: translateX(calc(-80px + 100vw * var(--drift))) scale(1); }
        }

        /* Floating Animation for Gift */
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <!-- Ambient Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] md:w-[40vw] md:h-[40vw] bg-yellow-900/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Screen 0: The Prank -->
    <div id="screen-0" class="screen active">
        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-sm w-[90%] border border-white/5 relative z-20">
            <h2 class="text-xl font-serif text-gold mb-2 tracking-widest uppercase text-sm">Security Check</h2>
            <p class="text-xs text-neutral-400 mb-10 tracking-widest leading-relaxed">System requires identity verification to release the package.</p>
            
            <div class="h-24 relative flex justify-center items-center w-full">
                <button id="verify-btn" onclick="dodgeButton()" class="px-6 py-3 bg-white/5 border border-white/10 rounded-full text-white tracking-widest text-xs hover:bg-white/10 uppercase transition-colors">
                    Yes, I am Didi
                </button>
            </div>

            <p id="prank-text" class="mt-6 text-xs text-red-400/80 opacity-0 transition-opacity duration-300 tracking-widest uppercase">
                Too slow!
            </p>

            <button id="bypass-btn" onclick="proceedToGift()" class="mt-8 text-[10px] text-neutral-500 uppercase tracking-widest opacity-0 transition-opacity duration-1000 hidden hover:text-white">
                Ugh, annoying. Just let me in.
            </button>
        </div>
    </div>

    <!-- Screen 1: Ahmedabad Gift (Minimalist Vector) -->
    <div id="screen-1" class="screen">
        <p class="text-[10px] tracking-[0.5em] text-neutral-500 mb-16 uppercase">Secured Delivery</p>
        
        <div class="float-anim cursor-pointer group relative z-20" onclick="openGift()">
            <!-- Minimalist Gold SVG Gift Box -->
            <div class="w-40 h-40 glass-panel rounded-2xl flex items-center justify-center transition-transform duration-500 group-hover:scale-105 group-hover:shadow-[0_0_40px_rgba(212,175,55,0.15)] relative overflow-hidden">
                <!-- Inner glow -->
                <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" class="text-gold">
                    <rect x="3" y="8" width="18" height="14" rx="2" ry="2"></rect>
                    <line x1="12" y1="8" x2="12" y2="22"></line>
                    <path d="M12 8l-3-3a2.5 2.5 0 1 0-3 3l6 3z"></path>
                    <path d="M12 8l3-3a2.5 2.5 0 1 1 3 3l-6 3z"></path>
                </svg>
            </div>
            
            <p class="mt-8 text-center text-xs tracking-widest text-neutral-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                TAP TO OPEN
            </p>
        </div>

        <h1 class="mt-12 text-2xl md:text-3xl font-serif text-gold font-light tracking-widest text-center px-6 leading-relaxed">
            A special gift<br>from Ahmedabad.
        </h1>
    </div>

    <!-- Screen 2: Glassmorphism Cake & Candles -->
    <div id="screen-2" class="screen">
        <h2 id="instruction-text" class="text-sm font-serif text-neutral-400 mb-16 tracking-[0.3em] uppercase transition-opacity duration-500">
            Tap to light the candles
        </h2>

        <div id="cake-container" onclick="handleCakeInteraction()">
            <div class="cut-line" id="cut-line"></div>

            <!-- We duplicate the cake structure for the left and right split -->
            <!-- LEFT HALF -->
            <div id="cake-left" class="cake-half">
                <!-- Base Plate -->
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-64 h-4 bg-white/5 rounded-full blur-[2px]"></div>
                <!-- Bottom Tier -->
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-48 h-20 glass-panel rounded-xl"></div>
                <!-- Top Tier -->
                <div class="absolute bottom-22 left-1/2 -translate-x-1/2 w-32 h-16 glass-panel rounded-xl border-b-0"></div>
                
                <!-- Candle (Left) -->
                <div class="absolute bottom-36 left-[35%] w-1.5 h-10 bg-white/20 rounded-full border border-white/10">
                    <div class="flame"></div>
                </div>
                <!-- Candle (Center - Shared visually) -->
                <div class="absolute bottom-36 left-[50%] -translate-x-1/2 w-1.5 h-10 bg-white/20 rounded-full border border-white/10">
                    <div class="flame"></div>
                </div>
            </div>

            <!-- RIGHT HALF -->
            <div id="cake-right" class="cake-half">
                <!-- Base Plate -->
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-64 h-4 bg-white/5 rounded-full blur-[2px]"></div>
                <!-- Bottom Tier -->
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-48 h-20 glass-panel rounded-xl"></div>
                <!-- Top Tier -->
                <div class="absolute bottom-22 left-1/2 -translate-x-1/2 w-32 h-16 glass-panel rounded-xl border-b-0"></div>
                
                <!-- Candle (Center - Shared visually) -->
                <div class="absolute bottom-36 left-[50%] -translate-x-1/2 w-1.5 h-10 bg-white/20 rounded-full border border-white/10">
                    <div class="flame hidden"></div> <!-- Hidden so flame doesn't double-render -->
                </div>
                <!-- Candle (Right) -->
                <div class="absolute bottom-36 left-[65%] w-1.5 h-10 bg-white/20 rounded-full border border-white/10">
                    <div class="flame"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screen 3: The Celebration (Strictly formatted text) -->
    <div id="screen-3" class="screen">
        <div id="balloon-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>
        
        <div class="relative z-10 text-center px-6 w-full flex flex-col items-center">
            <div class="w-px h-16 bg-gradient-to-b from-transparent to-gold mb-8 opacity-50"></div>
            
            <h1 class="text-4xl md:text-6xl font-serif text-gold leading-tight tracking-wide">
                A very very <br><span class="text-white mt-2 block">Happy 25th</span><br>Birthday Didi!
            </h1>
            
            <div class="w-px h-16 bg-gradient-to-t from-transparent to-gold mt-8 opacity-50"></div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- Step 0: The Prank ---
        let evadeCount = 0;
        const btn = document.getElementById('verify-btn');
        const prankText = document.getElementById('prank-text');
        const bypassBtn = document.getElementById('bypass-btn');

        function dodgeButton() {
            if (evadeCount < 3) {
                // Move button securely within screen bounds
                const x = (Math.random() - 0.5) * 120;
                const y = (Math.random() - 0.5) * 120;
                btn.style.transform = `translate(${x}px, ${y}px)`;
                
                prankText.style.opacity = 1;
                evadeCount++;

                if (evadeCount === 3) {
                    setTimeout(() => {
                        bypassBtn.classList.remove('hidden');
                        setTimeout(() => bypassBtn.style.opacity = 1, 50);
                    }, 800);
                }
            } else {
                proceedToGift();
            }
        }

        function switchScreen(from, to) {
            document.getElementById(`screen-${from}`).classList.remove('active');
            setTimeout(() => {
                document.getElementById(`screen-${to}`).classList.add('active');
            }, 1200); // Wait for smooth fade out
        }

        function proceedToGift() { switchScreen(0, 1); }
        function openGift() { switchScreen(1, 2); }

        // --- Step 2: Glass Cake Interactions ---
        let cakeState = 0; // 0: unlit, 1: lit ready to cut
        
        function handleCakeInteraction() {
            const text = document.getElementById('instruction-text');
            const container = document.getElementById('cake-container');

            if (cakeState === 0) {
                // 1. Light Candles
                document.querySelectorAll('.flame').forEach(f => f.classList.add('lit'));
                
                text.style.opacity = 0;
                setTimeout(() => {
                    text.innerText = "Make a wish, then tap to cut";
                    text.style.opacity = 1;
                }, 500);
                
                cakeState = 1;

            } else if (cakeState === 1) {
                // 2. Cut Cake Effect
                text.style.opacity = 0;
                container.style.pointerEvents = 'none';

                // Activate cut line down the middle
                document.getElementById('cut-line').style.transform = 'translateX(-50%) scaleY(1)';

                // Split the two SVG halves
                setTimeout(() => {
                    container.classList.add('cut-active');
                    document.querySelectorAll('.flame').forEach(f => f.style.opacity = 0);
                }, 600);

                // Transition to finale
                setTimeout(() => {
                    triggerFinale();
                    switchScreen(2, 3);
                }, 1800);
            }
        }

        // --- Step 3: Minimalist Celebration ---
        function triggerFinale() {
            // Elegant Confetti (Gold, White, Champagne)
            const duration = 4 * 1000;
            const animationEnd = Date.now() + duration;
            
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                
                confetti({
                    particleCount: 20,
                    startVelocity: 25,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    colors: ['#d4af37', '#f3e5ab', '#ffffff', '#aaaaaa'],
                    disableForReducedMotion: true,
                    zIndex: 100
                });
            }, 300);

            // Generate Sleek CSS Balloons
            const container = document.getElementById('balloon-container');
            const colors = ['#d4af37', '#ffffff', '#555555'];
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.style.left = `${Math.random() * 100}vw`;
                    balloon.style.setProperty('--drift', (Math.random() * 2 - 1).toFixed(2));
                    balloon.style.color = colors[Math.floor(Math.random() * colors.length)];
                    container.appendChild(balloon);
                }, i * 250);
            }
        }
    </script>
</body>
</html>
